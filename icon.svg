<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pastel background, matching the app's Pastel theme gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf3f7"/>
      <stop offset="50%" stop-color="#eef1fb"/>
      <stop offset="100%" stop-color="#e8f6f3"/>
    </linearGradient>

    <radialGradient id="glow" cx="42%" cy="34%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Saturn-emoji style banded surface -->
    <linearGradient id="band1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8dfa8"/>
      <stop offset="100%" stop-color="#d8cc8a"/>
    </linearGradient>

    <!-- Sphere shading overlay: light source upper-left, deep shadow lower-right -->
    <radialGradient id="sphereShade" cx="34%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5a4620" stop-opacity="0.45"/>
    </radialGradient>

    <radialGradient id="specular" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a4a17"/>
      <stop offset="45%" stop-color="#ffe3ad"/>
      <stop offset="55%" stop-color="#ffe3ad"/>
      <stop offset="100%" stop-color="#8a4a17"/>
    </linearGradient>

    <linearGradient id="ringBack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b98a56"/>
      <stop offset="50%" stop-color="#e8c48c"/>
      <stop offset="100%" stop-color="#b98a56"/>
    </linearGradient>

    <radialGradient id="shadowFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1b6e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2a1b6e" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="planetClip">
      <circle cx="0" cy="0" r="112"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- twinkles -->
  <g fill="#1266d8">
    <path d="M 396 118 l 9 21 21 9 -21 9 -9 21 -9 -21 -21 -9 21 -9 z" opacity="0.55"/>
    <path d="M 104 300 l 6 15 15 6 -15 6 -6 15 -6 -15 -15 -6 15 -6 z" opacity="0.5"/>
  </g>
  <g fill="#7a4fd6">
    <circle cx="120" cy="120" r="6" opacity="0.5"/>
    <circle cx="430" cy="330" r="5" opacity="0.45"/>
    <circle cx="90" cy="410" r="5" opacity="0.4"/>
  </g>

  <!-- cast shadow on the ground -->
  <ellipse cx="256" cy="398" rx="150" ry="26" fill="url(#shadowFade)"/>

  <g transform="translate(256 240) rotate(-16)">
    <!-- back half of the ring system (behind the planet): flat, gapped bands
         made of short dashes so they read as countless tiny rocks/ice chunks
         rather than a solid painted band, like Saturn's real rings. -->
    <g fill="none" stroke-linecap="round" opacity="0.92">
      <path d="M -150 0 A 150 27 0 0 1 150 0" stroke="#c9b48a" stroke-width="9" stroke-dasharray="2.4 2.1"/>
      <path d="M -168 0 A 168 30 0 0 1 168 0" stroke="#8f7a52" stroke-width="2.5" stroke-dasharray="1.5 2.5" opacity="0.5"/>
      <path d="M -186 0 A 186 33 0 0 1 186 0" stroke="#f0e4c4" stroke-width="15" stroke-dasharray="3.1 2.3"/>
      <path d="M -207 0 A 207 37 0 0 1 207 0" stroke="#8f7a52" stroke-width="2" stroke-dasharray="1.4 2.8" opacity="0.45"/>
      <path d="M -220 0 A 220 39 0 0 1 220 0" stroke="#ab9873" stroke-width="7" stroke-dasharray="1.9 2.6" opacity="0.85"/>
    </g>

    <!-- planet sphere: Saturn-emoji style horizontal colour bands -->
    <g clip-path="url(#planetClip)">
      <circle cx="0" cy="0" r="112" fill="url(#band1)"/>
      <rect x="-112" y="-112" width="224" height="26" fill="#efe6b6"/>
      <rect x="-112" y="-84" width="224" height="16" fill="#c9b877"/>
      <rect x="-112" y="-66" width="224" height="22" fill="#e6dca3"/>
      <rect x="-112" y="-42" width="224" height="14" fill="#b7d0c8" opacity="0.75"/>
      <rect x="-112" y="-26" width="224" height="20" fill="#ddd39a"/>
      <rect x="-112" y="-4" width="224" height="16" fill="#c39a6b" opacity="0.55"/>
      <rect x="-112" y="10" width="224" height="24" fill="#e9dfa9"/>
      <rect x="-112" y="34" width="224" height="14" fill="#94a9ae" opacity="0.6"/>
      <rect x="-112" y="46" width="224" height="24" fill="#d9cd8e"/>
      <rect x="-112" y="68" width="224" height="20" fill="#c7bb7f"/>
      <rect x="-112" y="86" width="224" height="26" fill="#b9ad72"/>
      <ellipse cx="-8" cy="-2" rx="46" ry="9" fill="#c98a52" opacity="0.35"/>
      <circle cx="0" cy="0" r="112" fill="url(#sphereShade)"/>
    </g>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#8a723a" stroke-width="2" opacity="0.3"/>

    <!-- specular highlight -->
    <ellipse cx="-40" cy="-42" rx="34" ry="22" fill="url(#specular)"/>

    <!-- shadow the front ring casts onto the planet -->
    <path d="M -112 5 A 150 26 0 0 0 112 5" fill="none" stroke="#5a3d16" stroke-width="10" opacity="0.25" stroke-linecap="round"/>

    <!-- front half of the ring system (in front of the planet) -->
    <g fill="none" stroke-linecap="round">
      <path d="M -150 0 A 150 27 0 0 0 150 0" stroke="#d9a75f" stroke-width="9" stroke-dasharray="2.4 2.1"/>
      <path d="M -168 0 A 168 30 0 0 0 168 0" stroke="#6b4c22" stroke-width="2.5" stroke-dasharray="1.5 2.5" opacity="0.55"/>
      <path d="M -186 0 A 186 33 0 0 0 186 0" stroke="#ffe9bd" stroke-width="15" stroke-dasharray="3.1 2.3"/>
      <path d="M -207 0 A 207 37 0 0 0 207 0" stroke="#6b4c22" stroke-width="2" stroke-dasharray="1.4 2.8" opacity="0.5"/>
      <path d="M -220 0 A 220 39 0 0 0 220 0" stroke="#c39a5e" stroke-width="7" stroke-dasharray="1.9 2.6" opacity="0.9"/>
    </g>
  </g>
</svg>
