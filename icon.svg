<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pastel background, matching the app's Pastel theme gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf3f7"/>
      <stop offset="50%" stop-color="#eef1fb"/>
      <stop offset="100%" stop-color="#e8f6f3"/>
    </linearGradient>

    <radialGradient id="glow" cx="42%" cy="34%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Sphere shading: light source upper-left, deep shadow lower-right -->
    <radialGradient id="planetSphere" cx="36%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffe9b8"/>
      <stop offset="35%" stop-color="#ffc978"/>
      <stop offset="70%" stop-color="#f28c3d"/>
      <stop offset="100%" stop-color="#c85f1f"/>
    </radialGradient>

    <radialGradient id="specular" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a4a17"/>
      <stop offset="45%" stop-color="#ffe3ad"/>
      <stop offset="55%" stop-color="#ffe3ad"/>
      <stop offset="100%" stop-color="#8a4a17"/>
    </linearGradient>

    <linearGradient id="ringBack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b98a56"/>
      <stop offset="50%" stop-color="#e8c48c"/>
      <stop offset="100%" stop-color="#b98a56"/>
    </linearGradient>

    <radialGradient id="shadowFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1b6e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2a1b6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- twinkles -->
  <g fill="#1266d8">
    <path d="M 396 118 l 9 21 21 9 -21 9 -9 21 -9 -21 -21 -9 21 -9 z" opacity="0.55"/>
    <path d="M 104 300 l 6 15 15 6 -15 6 -6 15 -6 -15 -15 -6 15 -6 z" opacity="0.5"/>
  </g>
  <g fill="#7a4fd6">
    <circle cx="120" cy="120" r="6" opacity="0.5"/>
    <circle cx="430" cy="330" r="5" opacity="0.45"/>
    <circle cx="90" cy="410" r="5" opacity="0.4"/>
  </g>

  <!-- cast shadow on the ground -->
  <ellipse cx="256" cy="398" rx="150" ry="26" fill="url(#shadowFade)"/>

  <g transform="translate(256 240) rotate(-16)">
    <!-- back half of ring (behind the planet) -->
    <path d="M -190 0 A 190 54 0 0 1 190 0" fill="none" stroke="url(#ringBack)" stroke-width="22" stroke-linecap="round"/>

    <!-- planet sphere -->
    <circle cx="0" cy="0" r="112" fill="url(#planetSphere)"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#a5501a" stroke-width="2" opacity="0.25"/>

    <!-- craters, shaded for depth -->
    <ellipse cx="-28" cy="34" rx="17" ry="12" fill="#c9701f" opacity="0.5"/>
    <ellipse cx="-31" cy="30" rx="17" ry="12" fill="none" stroke="#ffd79a" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="46" cy="-6" rx="12" ry="9" fill="#c9701f" opacity="0.45"/>
    <ellipse cx="18" cy="52" rx="9" ry="7" fill="#c9701f" opacity="0.4"/>

    <!-- specular highlight -->
    <ellipse cx="-40" cy="-42" rx="34" ry="22" fill="url(#specular)"/>

    <!-- shadow the front ring casts onto the planet -->
    <path d="M -112 6 A 190 40 0 0 0 112 6" fill="none" stroke="#7a3c10" stroke-width="14" opacity="0.28" stroke-linecap="round"/>

    <!-- front half of ring (in front of the planet) -->
    <path d="M -190 0 A 190 54 0 0 0 190 0" fill="none" stroke="url(#ringFront)" stroke-width="24" stroke-linecap="round"/>
  </g>
</svg>
